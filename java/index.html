<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zensei Art Academy - Cursos Profesionales</title>
    <link rel="stylesheet" href="estilos-principal.css">
    <style>
        /* Estilos de la sección de pago (estética profesional) */
        .seccion-pago {
            width: 100%; max-width: 800px; margin: 40px auto;
            background: rgba(90, 15, 150, 0.1); padding: 40px;
            border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            display: none; text-align: center; color: white;
        }
        .contenedor-tarjetas-pago { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-top: 30px; }
        .tarjeta-pago {
            background: rgba(0, 0, 0, 0.3); padding: 25px; border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; transition: 0.3s; width: 220px;
        }
        .tarjeta-pago:hover { border-color: #00ffcc; transform: translateY(-5px); box-shadow: 0 0 15px rgba(0, 255, 204, 0.2); }
        .btn-confirmar { margin-top: 30px; background: #00ffcc; color: #000; padding: 15px 30px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="contenedor-principal">
        <div class="contenedor-ajustes">
            <button class="btn-icon" onclick="toggleMenu(event)">⚙️</button>
            <div id="menuOpciones" class="menu-desplegable">
                <span class="menu-titulo">Visual</span>
                <button onclick="cambiarTema('oscuro')">🌙 Modo Oscuro</button>
                <button onclick="cambiarTema('claro')">☀️ Modo Claro</button>
                <hr class="menu-separador">
                <span class="menu-titulo">Audio</span>
                <button onclick="toggleSonido()" id="btnSonido">🔊 Sonido: ON</button>
                <hr class="menu-separador">
                <button onclick="window.location.href='login.html'" id="btnLogin">🔑 Iniciar Sesión</button>
                <button id="btnLogout" onclick="cerrarSesion()" style="display:none;">🚪 Cerrar Sesión</button>
            </div>
        </div>

        <header class="encabezado">
            <h1>Zensei Art Academy</h1>
            <p>Eleva tu talento al nivel profesional.</p>
        </header>

        <h3 class="titulo-categoria">🧑‍🎨 Estilos de Dibujo / Especializaciones</h3>
        <div class="grid-cursos" id="grid-cursos">
            <p style="text-align: center;">Cargando cursos...</p>
        </div>

        <section id="seccion-pago" class="seccion-pago">
            <h2>Finalizar Inscripción</h2>
            <div class="contenedor-tarjetas-pago">
                <div class="tarjeta-pago" onclick="seleccionarMetodo('Nicaragua')"><b>Nicaragua</b><p>BAC / BANPRO</p></div>
                <div class="tarjeta-pago" onclick="seleccionarMetodo('Latam')"><b>Latinoamérica</b><p>Western Union</p></div>
                <div class="tarjeta-pago" onclick="seleccionarMetodo('Global')"><b>Global</b><p>PayPal</p></div>
            </div>
            <div id="area-confirmacion" style="display:none;">
                <button class="btn-confirmar" onclick="confirmarInscripcion()">✅ Aceptar Pago y Registrarme</button>
            </div>
            <button onclick="cancelarPago()" style="background:none; border:none; color:gray; cursor:pointer; margin-top:20px;">Cancelar</button>
        </section>

        <footer class="pie-pagina">
            <p>© 2026 Zensei Art Academy. Todos los derechos reservados.</p>
        </footer>
    </div>

    <script>
        let cursoIdSeleccionado = null;
        let metodoSeleccionado = null;
        const API_BASE = 'http://localhost:3001/api';

        // Funciones originales conservadas
        function toggleMenu(event) { event.stopPropagation(); document.getElementById("menuOpciones").classList.toggle("mostrar"); }
        function cambiarTema(tipo) { document.body.classList.toggle('light-mode', tipo === 'claro'); }
        function toggleSonido() { /* Lógica de sonido */ }
        function cerrarSesion() { localStorage.clear(); location.reload(); }

        // Nueva lógica de compra
        function iniciarCompra(id) {
            cursoIdSeleccionado = id;
            document.getElementById('grid-cursos').style.display = 'none';
            document.getElementById('seccion-pago').style.display = 'block';
        }

        function seleccionarMetodo(metodo) {
            metodoSeleccionado = metodo;
            document.getElementById('area-confirmacion').style.display = 'block';
        }

        async function confirmarInscripcion() {
            const email = localStorage.getItem('usuarioLogueado');
            if (!email) { alert("Inicia sesión primero."); return; }
            
            const response = await fetch(`${API_BASE}/inscripcion`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, cursoId: cursoIdSeleccionado, metodo: metodoSeleccionado })
            });
            alert("¡Pago concluido y registrado!");
            window.location.reload();
        }

        function cancelarPago() {
            document.getElementById('grid-cursos').style.display = 'grid';
            document.getElementById('seccion-pago').style.display = 'none';
        }

        async function cargarCursos() {
            const res = await fetch(`${API_BASE}/cursos`);
            const data = await res.json();
            const grid = document.getElementById('grid-cursos');
            grid.innerHTML = '';
            data.datos.forEach(curso => {
                grid.innerHTML += `
                    <div class="tarjeta-curso">
                        <h4>${curso.nombre}</h4>
                        <button onclick="iniciarCompra(${curso.id})">Comprar</button>
                    </div>`;
            });
        }

        window.onload = cargarCursos;
    </script>
</body>
</html>
