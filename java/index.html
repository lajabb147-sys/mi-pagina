<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zensei Art Academy - Cursos Profesionales</title>
    <link rel="stylesheet" href="estilos-principal.css">
    <style>
        /* La capa de pago que oculta todo lo demás */
        .pantalla-pago-full {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0f; z-index: 9999; justify-content: center; align-items: center;
            flex-direction: column; color: white;
        }
        .contenedor-tarjetas { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-top: 30px; }
        .tarjeta-pago {
            background: #1a1a2e; padding: 30px; border-radius: 20px; text-align: center;
            border: 2px solid #5a0f96; cursor: pointer; transition: 0.3s;
        }
        .tarjeta-pago:hover { border-color: #00ffcc; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="contenedor-principal" id="contenido-principal">
        <div class="contenedor-ajustes">
            <button class="btn-icon" onclick="toggleMenu(event)">⚙️</button>
            <div id="menuOpciones" class="menu-desplegable">
                <span class="menu-titulo" data-es="Visual" data-en="Visual">Visual</span>
                <button onclick="cambiarTema('oscuro')">🌙 <span data-es="Modo Oscuro" data-en="Dark Mode">Dark mode</span></button>
                <button onclick="cambiarTema('claro')">☀️ <span data-es="Modo Claro" data-en="Light Mode">Light mode</span></button>
                <hr class="menu-separador">
                <span class="menu-titulo" data-es="Idioma" data-en="Language">Idioma</span>
                <button onclick="cambiarIdioma('es')">Español</button>
                <button onclick="cambiarIdioma('en')">English</button>
                <hr class="menu-separador">
                <span class="menu-titulo" data-es="Audio" data-en="Audio">Audio</span>
                <button onclick="toggleSonido()" id="btnSonido" data-es="🔊 Sonido: ON" data-en="🔊 Sound: ON">🔊 Sonido: ON</button>
                <hr class="menu-separador">
                <button onclick="window.location.href='login.html'" id="btnLogin">🔑 <span data-es="Iniciar Sesión" data-en="Login">Iniciar Sesión</span></button>
                <button id="btnLogout" onclick="cerrarSesion()" style="display:none;">🚪 <span data-es="Cerrar Sesión" data-en="Logout">Cerrar Sesión</span></button>
            </div>
        </div>

        <header class="encabezado">
            <p class="txt-bienvenidos-arriba" data-es="Bienvenidos a" data-en="Welcome to">Bienvenidos a</p>
            <h1 class="titulo-academia">Zensei Art Academy</h1>
            <p class="txt-bienvenidos-abajo" data-es="Eleva tu talento al nivel profesional. Toca un curso para ver su especialización." data-en="Elevate your talent to a professional level. Tap a course to see its specialization.">
                Eleva tu talento al nivel profesional. Toca un curso para ver su especialización.
            </p>
        </header>

        <h3 class="titulo-categoria" data-es="🧑‍🎨 Estilos de Dibujo / Especializaciones" data-en="🧑‍🎨 Drawing Styles / Specializations">🧑‍🎨 Estilos de Dibujo / Especializaciones</h3>
        <div class="grid-cursos" id="grid-cursos">
            <p style="text-align: center; color: #666; grid-column: 1/-1; padding: 40px;">Cargando cursos...</p>
        </div>

        <section class="banner-inspirador">...</section>
        <footer class="pie-pagina">...</footer>
    </div>

    <section id="pantalla-pago" class="pantalla-pago-full">
        <h2>Selecciona tu método de pago</h2>
        <div class="contenedor-tarjetas">
            <div class="tarjeta-pago" onclick="confirmar('Nicaragua')"><h3>🇳🇮</h3><p>BAC / BANPRO</p></div>
            <div class="tarjeta-pago" onclick="confirmar('Latam')"><h3>🌎</h3><p>Western Union</p></div>
            <div class="tarjeta-pago" onclick="confirmar('Global')"><h3>💳</h3><p>PayPal</p></div>
        </div>
        <button onclick="cancelar()" style="margin-top: 40px; background: none; border: 1px solid #555; color: white; padding: 10px 20px; cursor: pointer;">Cancelar</button>
    </section>

    <script>
        /* TU LÓGICA ORIGINAL AQUÍ */
        // (Asegúrate de no borrar tus funciones cambiarIdioma, toggleMenu, reproducirSonido, etc.)
        
        async function cargarCursos() {
            // ... (Tu lógica original, pero en el botón de compra usa esta función de abajo)
        }

        /* LAS MODIFICACIONES AGREGADAS */
        function abrirPago() {
            document.getElementById('contenido-principal').style.display = 'none';
            document.getElementById('pantalla-pago').style.display = 'flex';
        }

        function cancelar() {
            document.getElementById('contenido-principal').style.display = 'block';
            document.getElementById('pantalla-pago').style.display = 'none';
        }

        async function confirmar(metodo) {
            alert("¡Pago con " + metodo + " procesado con éxito!");
            // Aquí puedes llamar a tu API para guardar en MySQL
            location.reload();
        }
        
        // ¡IMPORTANTE!: En tu función cargarCursos original, asegúrate de que el 
        // botón de comprar tenga: onclick="abrirPago()"
    </script>
</body>
</html>
