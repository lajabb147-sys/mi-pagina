<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zensei Art Academy</title>
    <link rel="stylesheet" href="estilos-principal.css">
    <style>
        /* Estilos para asegurar simetría en la pantalla de pago */
        .pantalla-pago-full {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; background: #0f0f0f; color: white; padding: 20px;
        }
        .contenedor-tarjetas { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .tarjeta-pago { 
            width: 150px; height: 150px; background: #1a1a1a; border: 2px solid #5a0f96; 
            border-radius: 15px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; cursor: pointer; transition: 0.3s;
        }
        .tarjeta-pago:hover { transform: scale(1.05); border-color: #00ffcc; }
    </style>
</head>
<body>
    <div class="contenedor-principal" id="contenido-principal">
        <div class="contenedor-ajustes">
            <button class="btn-icon" onclick="toggleMenu(event)">⚙️</button>
            <div id="menuOpciones" class="menu-desplegable">
                <button onclick="cambiarTema('oscuro')">🌙 Modo Oscuro</button>
                <button onclick="cambiarTema('claro')">☀️ Modo Claro</button>
                <button onclick="toggleSonido()" id="btnSonido">🔊 Sonido: ON</button>
                <button onclick="window.location.href='login.html'" id="btnLogin">🔑 Iniciar Sesión</button>
            </div>
        </div>

        <header class="encabezado">
            <h1>Zensei Art Academy</h1>
        </header>

        <div class="grid-cursos" id="grid-cursos">
            <p>Cargando cursos...</p>
        </div>
    </div>

    <section id="pantalla-pago" class="pantalla-pago-full" style="display:none;">
        <h2 style="margin-bottom: 30px;">Selecciona tu método de pago</h2>
        <div class="contenedor-tarjetas">
            <div class="tarjeta-pago" onclick="mostrarConfirmacion('Banco')"><h3>🏦</h3><p>Bancos</p></div>
            <div class="tarjeta-pago" onclick="mostrarConfirmacion('Western Union')"><h3>🌎</h3><p>Western Union</p></div>
            <div class="tarjeta-pago" onclick="mostrarConfirmacion('PayPal')"><h3>💳</h3><p>PayPal</p></div>
        </div>
        <div id="barra-confirmacion" style="display: none; margin-top: 40px; padding: 20px; border: 1px solid #5a0f96; border-radius: 12px; width: 300px; text-align: center;">
            <p id="info-curso-seleccionado"></p>
            <button onclick="confirmarPago()" style="background: #00ffcc; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; width: 100%;">Proceder a pagar</button>
        </div>
        <button onclick="cancelar()" style="margin-top: 20px; background: none; color: #666; border: none; cursor: pointer;">Cancelar</button>
    </section>

    <script>
        const API_BASE = 'http://localhost:3001/api';

        // Funciones recuperadas
        function toggleMenu(e) { document.getElementById("menuOpciones").classList.toggle("mostrar"); }
        function cambiarTema(t) { document.body.className = t === 'claro' ? 'light-mode' : ''; }
        function toggleSonido() { alert("Sonido alternado"); }
        function mostrarConfirmacion(metodo) { 
            document.getElementById('barra-confirmacion').style.display = 'block'; 
            document.getElementById('info-curso-seleccionado').innerText = `Pago vía ${metodo}`;
            window.metodoSeleccionado = metodo;
        }
        
        async function cargarCursos() {
            try {
                const res = await fetch(`${API_BASE}/cursos`);
                const data = await res.json();
                const grid = document.getElementById('grid-cursos');
                grid.innerHTML = '';
                if(data.estado === 'éxito') {
                    data.datos.forEach(c => {
                        grid.innerHTML += `<div class="tarjeta-curso"><h4>${c.nombre}</h4><button onclick="abrirPago('${c.nombre}', ${c.precio})">Comprar</button></div>`;
                    });
                }
            } catch(e) { console.error(e); }
        }

        function abrirPago(nombre, precio) { 
            document.getElementById('contenido-principal').style.display = 'none'; 
            document.getElementById('pantalla-pago').style.display = 'flex'; 
        }
        function cancelar() { 
            document.getElementById('contenido-principal').style.display = 'block'; 
            document.getElementById('pantalla-pago').style.display = 'none'; 
        }
        function confirmarPago() { alert("Pago procesado"); location.reload(); }

        window.onload = cargarCursos;
    </script>
</body>
</html>
