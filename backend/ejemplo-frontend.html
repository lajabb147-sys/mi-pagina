<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos - Zensei Art Academy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .contenedor {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .grid-cursos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .tarjeta-curso {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .tarjeta-curso:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .tarjeta-curso h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .tarjeta-curso p {
            color: #666;
            font-size: 0.9em;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .precio {
            font-size: 1.5em;
            color: #764ba2;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
        }

        .btn:hover {
            background: #764ba2;
        }

        .formulario {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .formulario h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .form-grupo {
            margin-bottom: 15px;
        }

        .form-grupo label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }

        .form-grupo input,
        .form-grupo textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: 'Arial', sans-serif;
        }

        .form-grupo textarea {
            resize: vertical;
            min-height: 100px;
        }

        .exito {
            background: #51cf66;
            color: white;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>🎨 Cursos - Zensei Art Academy</h1>

        <!-- Sección para crear curso -->
        <div class="formulario">
            <h2>Crear Nuevo Curso</h2>
            <form id="formularioCurso" onsubmit="crearCurso(event)">
                <div class="form-grupo">
                    <label for="nombre">Nombre del Curso:</label>
                    <input type="text" id="nombre" required>
                </div>
                <div class="form-grupo">
                    <label for="descripcion">Descripción:</label>
                    <textarea id="descripcion" required></textarea>
                </div>
                <div class="form-grupo">
                    <label for="precio">Precio ($):</label>
                    <input type="number" id="precio" step="0.01" required>
                </div>
                <div class="form-grupo">
                    <label for="imagen">URL de Imagen:</label>
                    <input type="text" id="imagen">
                </div>
                <button type="submit" class="btn">Crear Curso</button>
            </form>
        </div>

        <!-- Mensajes de estado -->
        <div id="mensaje"></div>

        <!-- Sección de cursos -->
        <div id="cursos" class="grid-cursos">
            <div class="loading">Cargando cursos...</div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        // Cargar cursos al abrir la página
        document.addEventListener('DOMContentLoaded', cargarCursos);

        // Cargar todos los cursos
        async function cargarCursos() {
            try {
                const response = await fetch(`${API_URL}/cursos`);
                const resultado = await response.json();

                if (resultado.estado === 'éxito') {
                    mostrarCursos(resultado.datos);
                } else {
                    mostrarError('Error al cargar los cursos');
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarError('Error de conexión con el servidor');
            }
        }

        // Mostrar cursos en la página
        function mostrarCursos(cursos) {
            const contenedor = document.getElementById('cursos');
            
            if (cursos.length === 0) {
                contenedor.innerHTML = '<p style="color: white; text-align: center; grid-column: 1/-1;">No hay cursos disponibles</p>';
                return;
            }

            contenedor.innerHTML = cursos.map(curso => `
                <div class="tarjeta-curso">
                    <h3>${curso.nombre}</h3>
                    <p>${curso.descripcion}</p>
                    <div class="precio">$${parseFloat(curso.precio).toFixed(2)}</div>
                    <button class="btn" onclick="eliminarCurso(${curso.id})">Eliminar</button>
                </div>
            `).join('');
        }

        // Crear nuevo curso
        async function crearCurso(event) {
            event.preventDefault();

            const nombre = document.getElementById('nombre').value;
            const descripcion = document.getElementById('descripcion').value;
            const precio = document.getElementById('precio').value;
            const imagen = document.getElementById('imagen').value;

            try {
                const response = await fetch(`${API_URL}/cursos`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        nombre,
                        descripcion,
                        precio,
                        imagen
                    })
                });

                const resultado = await response.json();

                if (resultado.estado === 'éxito') {
                    mostrarExito('Curso creado correctamente');
                    document.getElementById('formularioCurso').reset();
                    cargarCursos();
                } else {
                    mostrarError('Error al crear el curso');
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarError('Error de conexión con el servidor');
            }
        }

        // Eliminar curso
        async function eliminarCurso(id) {
            if (!confirm('¿Estás seguro de que quieres eliminar este curso?')) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/cursos/${id}`, {
                    method: 'DELETE'
                });

                const resultado = await response.json();

                if (resultado.estado === 'éxito') {
                    mostrarExito('Curso eliminado correctamente');
                    cargarCursos();
                } else {
                    mostrarError('Error al eliminar el curso');
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarError('Error de conexión con el servidor');
            }
        }

        // Mostrar mensaje de error
        function mostrarError(mensaje) {
            const div = document.getElementById('mensaje');
            div.innerHTML = `<div class="error">${mensaje}</div>`;
            setTimeout(() => {
                div.innerHTML = '';
            }, 5000);
        }

        // Mostrar mensaje de éxito
        function mostrarExito(mensaje) {
            const div = document.getElementById('mensaje');
            div.innerHTML = `<div class="exito">${mensaje}</div>`;
            setTimeout(() => {
                div.innerHTML = '';
            }, 5000);
        }
    </script>
</body>
</html>
