<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zensei Art Academy - Gestión de Cursos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .contenedor {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        header h1 {
            color: #667eea;
            margin-bottom: 10px;
        }

        header p {
            color: #666;
        }

        .formulario {
            background: white;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .formulario h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.3em;
        }

        .form-grupo {
            margin-bottom: 15px;
        }

        .form-grupo label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }

        .form-grupo input,
        .form-grupo textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 1em;
        }

        .form-grupo textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-grupo input:focus,
        .form-grupo textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #764ba2;
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-eliminar {
            background: #dc3545;
            padding: 8px 15px;
            font-size: 0.9em;
        }

        .btn-eliminar:hover {
            background: #c82333;
        }

        .mensaje {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            display: none;
        }

        .mensaje.exito {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .mensaje.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .cursos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .tarjeta {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .tarjeta:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .tarjeta h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .tarjeta p {
            color: #666;
            margin-bottom: 10px;
            line-height: 1.5;
            font-size: 0.95em;
        }

        .precio {
            font-size: 1.5em;
            color: #764ba2;
            font-weight: bold;
            margin: 15px 0;
        }

        .tarjeta-botones {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .tarjeta-botones button {
            flex: 1;
        }

        .cargando {
            text-align: center;
            color: white;
            padding: 40px;
            font-size: 1.1em;
        }

        .sin-cursos {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            color: #666;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }

            .cursos {
                grid-template-columns: 1fr;
            }
        }

        .status {
            padding: 10px 15px;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 0.9em;
            display: none;
        }

        .status.conectado {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <!-- Encabezado -->
        <header>
            <h1>🎨 Zensei Art Academy</h1>
            <p>Gestión de Cursos - Backend</p>
            <div id="estadoConexion" class="status"></div>
        </header>

        <!-- Contenido principal -->
        <div class="grid-2">
            <!-- Formulario de creación -->
            <div class="formulario">
                <h2>Crear Nuevo Curso</h2>
                <form id="formularioCurso" onsubmit="crearCurso(event)">
                    <div class="form-grupo">
                        <label for="nombre">Nombre del Curso</label>
                        <input type="text" id="nombre" required>
                    </div>
                    <div class="form-grupo">
                        <label for="descripcion">Descripción</label>
                        <textarea id="descripcion" required></textarea>
                    </div>
                    <div class="form-grupo">
                        <label for="precio">Precio ($)</label>
                        <input type="number" id="precio" step="0.01" min="0" required>
                    </div>
                    <button type="submit" class="btn">Crear Curso</button>
                </form>
            </div>

            <!-- Información de conexión -->
            <div class="formulario">
                <h2>Información del Servidor</h2>
                <div id="infoServidor" style="color: #666; line-height: 1.8;">
                    Conectando...
                </div>
            </div>
        </div>

        <!-- Mensaje de estado -->
        <div id="mensaje" class="mensaje"></div>

        <!-- Cursos disponibles -->
        <div class="formulario">
            <h2>Cursos Disponibles</h2>
            <div id="cursos" class="cursos">
                <div class="cargando">Cargando cursos...</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';

        // Cargar datos al abrir la página
        document.addEventListener('DOMContentLoaded', function() {
            verificarConexion();
            cargarCursos();
            
            // Actualizar cada 10 segundos
            setInterval(verificarConexion, 10000);
        });

        // Verificar conexión al servidor
        async function verificarConexion() {
            try {
                const response = await fetch(API_URL + '/test');
                const data = await response.json();
                
                document.getElementById('estadoConexion').className = 'status conectado';
                document.getElementById('estadoConexion').textContent = '✅ Servidor conectado';
                
                document.getElementById('infoServidor').innerHTML = `
                    <strong>Servidor:</strong> ${window.location.origin}<br>
                    <strong>Base de Datos:</strong> Activa<br>
                    <strong>Estado:</strong> Funcionando correctamente<br>
                    <strong>Versión:</strong> ${data.versión}
                `;
            } catch (error) {
                document.getElementById('estadoConexion').className = 'status error';
                document.getElementById('estadoConexion').textContent = '❌ Servidor desconectado';
                
                document.getElementById('infoServidor').innerHTML = `
                    <strong style="color: #dc3545;">Error de conexión</strong><br>
                    Asegúrate de que:<br>
                    1. El backend esté iniciado<br>
                    2. MySQL esté activo<br>
                    3. La BD "zensei_academy" exista
                `;
            }
        }

        // Cargar cursos
        async function cargarCursos() {
            try {
                const response = await fetch(API_URL + '/cursos');
                const resultado = await response.json();
                
                if (resultado.estado === 'éxito') {
                    mostrarCursos(resultado.datos);
                } else {
                    mostrarError('Error al cargar los cursos');
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarError('Error de conexión con el servidor');
            }
        }

        // Mostrar cursos en el DOM
        function mostrarCursos(cursos) {
            const contenedor = document.getElementById('cursos');
            
            if (cursos.length === 0) {
                contenedor.innerHTML = '<div class="sin-cursos">No hay cursos disponibles</div>';
                return;
            }

            contenedor.innerHTML = cursos.map(curso => `
                <div class="tarjeta">
                    <h3>${curso.nombre}</h3>
                    <p>${curso.descripcion}</p>
                    <div class="precio">$${parseFloat(curso.precio).toFixed(2)}</div>
                    <div class="tarjeta-botones">
                        <button class="btn btn-eliminar" onclick="eliminarCurso(${curso.id})">Eliminar</button>
                    </div>
                </div>
            `).join('');
        }

        // Crear nuevo curso
        async function crearCurso(event) {
            event.preventDefault();

            const nombre = document.getElementById('nombre').value;
            const descripcion = document.getElementById('descripcion').value;
            const precio = document.getElementById('precio').value;

            try {
                const response = await fetch(API_URL + '/cursos', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        nombre: nombre,
                        descripcion: descripcion,
                        precio: precio,
                        imagen: null
                    })
                });

                const resultado = await response.json();

                if (resultado.estado === 'éxito') {
                    mostrarExito('Curso creado correctamente');
                    document.getElementById('formularioCurso').reset();
                    cargarCursos();
                } else {
                    mostrarError('Error al crear el curso: ' + resultado.mensaje);
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarError('Error de conexión: ' + error.message);
            }
        }

        // Eliminar curso
        async function eliminarCurso(id) {
            if (!confirm('¿Estás seguro de que quieres eliminar este curso?')) {
                return;
            }

            try {
                const response = await fetch(API_URL + '/cursos/' + id, {
                    method: 'DELETE'
                });

                const resultado = await response.json();

                if (resultado.estado === 'éxito') {
                    mostrarExito('Curso eliminado correctamente');
                    cargarCursos();
                } else {
                    mostrarError('Error al eliminar el curso');
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarError('Error de conexión: ' + error.message);
            }
        }

        // Mostrar mensaje de error
        function mostrarError(mensaje) {
            const div = document.getElementById('mensaje');
            div.className = 'mensaje error';
            div.textContent = '❌ ' + mensaje;
            setTimeout(() => {
                div.className = 'mensaje';
            }, 5000);
        }

        // Mostrar mensaje de éxito
        function mostrarExito(mensaje) {
            const div = document.getElementById('mensaje');
            div.className = 'mensaje exito';
            div.textContent = '✅ ' + mensaje;
            setTimeout(() => {
                div.className = 'mensaje';
            }, 5000);
        }
    </script>
</body>
</html>
