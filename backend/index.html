<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zensei Art Academy - Gestión de Cursos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .contenedor { max-width: 1000px; margin: 0 auto; }
        header { background: white; padding: 30px; border-radius: 10px; margin-bottom: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); text-align: center; }
        header h1 { color: #667eea; margin-bottom: 10px; }
        .formulario { background: white; padding: 25px; border-radius: 10px; margin-bottom: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .formulario h2 { color: #667eea; margin-bottom: 20px; font-size: 1.3em; }
        .form-grupo { margin-bottom: 15px; }
        .form-grupo label { display: block; margin-bottom: 5px; color: #333; font-weight: bold; }
        .form-grupo input, .form-grupo textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 1em; }
        .btn { background: #667eea; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .btn-eliminar { background: #dc3545; padding: 8px 15px; font-size: 0.9em; width: auto; }
        .mensaje { padding: 15px; margin-bottom: 20px; border-radius: 5px; display: none; }
        .mensaje.exito { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block; }
        .mensaje.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block; }
        .cursos { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .tarjeta { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .status { padding: 10px 15px; border-radius: 5px; margin-top: 10px; font-size: 0.9em; display: none; }
        .status.conectado { background: #d4edda; color: #155724; display: block; }
        .status.error { background: #f8d7da; color: #721c24; display: block; }
        .oculto { display: none; }
    </style>
</head>
<body>
    <div class="contenedor">
        <header>
            <h1>🎨 Zensei Art Academy</h1>
            <p>Gestión de Cursos</p>
            <div id="estadoConexion" class="status"></div>
        </header>

        <div id="seccionLogin" class="formulario">
            <h2>Acceso al Sistema</h2>
            <form id="formLogin">
                <div class="form-grupo">
                    <label>Correo Electrónico</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-grupo">
                    <label>Contraseña</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" id="btnEntrar" class="btn">Entrar</button>
            </form>
        </div>

        <div id="seccionGestion" class="oculto">
            <div class="formulario">
                <h2>Crear Nuevo Curso</h2>
                <form id="formularioCurso">
                    <div class="form-grupo">
                        <label>Nombre del Curso</label>
                        <input type="text" id="nombre" required>
                    </div>
                    <div class="form-grupo">
                        <label>Descripción</label>
                        <textarea id="descripcion" required></textarea>
                    </div>
                    <div class="form-grupo">
                        <label>Precio ($)</label>
                        <input type="number" id="precio" step="0.01" min="0" required>
                    </div>
                    <button type="submit" class="btn">Crear Curso</button>
                </form>
            </div>
            <div id="mensaje" class="mensaje"></div>
            <div class="formulario">
                <h2>Cursos Disponibles</h2>
                <div id="cursos" class="cursos"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';

        // Event Listeners para evitar recarga
        document.getElementById('formLogin').addEventListener('submit', hacerLogin);
        document.getElementById('formularioCurso').addEventListener('submit', crearCurso);

        async function hacerLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnEntrar');
            
            btn.disabled = true;
            btn.textContent = 'Autenticando...';

            try {
                const response = await fetch(API_URL + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.mensaje || 'Error de login');

                localStorage.setItem('token', data.token);
                document.getElementById('seccionLogin').classList.add('oculto');
                document.getElementById('seccionGestion').classList.remove('oculto');
                verificarConexion();
                cargarCursos();
            } catch (err) {
                alert('❌ ' + err.message);
                btn.disabled = false;
                btn.textContent = 'Entrar';
            }
        }

        async function verificarConexion() {
            try {
                const res = await fetch(API_URL + '/test');
                const el = document.getElementById('estadoConexion');
                el.className = 'status conectado';
                el.textContent = '✅ Servidor conectado';
            } catch (e) {
                document.getElementById('estadoConexion').className = 'status error';
                document.getElementById('estadoConexion').textContent = '❌ Servidor desconectado';
            }
        }

        async function cargarCursos() {
            try {
                const res = await fetch(API_URL + '/cursos', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                });
                const resJson = await res.json();
                if (resJson.estado === 'éxito') mostrarCursos(resJson.datos);
            } catch (e) { mostrarError('Error al cargar cursos'); }
        }

        function mostrarCursos(cursos) {
            const cont = document.getElementById('cursos');
            cont.innerHTML = cursos.map(c => `
                <div class="tarjeta">
                    <h3>${c.nombre}</h3>
                    <p>${c.descripcion}</p>
                    <div class="precio">$${parseFloat(c.precio).toFixed(2)}</div>
                    <button class="btn btn-eliminar" onclick="eliminarCurso(${c.id})">Eliminar</button>
                </div>
            `).join('');
        }

        async function crearCurso(e) {
            e.preventDefault();
            const nombre = document.getElementById('nombre').value;
            const descripcion = document.getElementById('descripcion').value;
            const precio = document.getElementById('precio').value;

            try {
                const res = await fetch(API_URL + '/cursos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('token') },
                    body: JSON.stringify({ nombre, descripcion, precio })
                });
                if (res.ok) {
                    mostrarExito('Curso creado correctamente');
                    document.getElementById('formularioCurso').reset();
                    cargarCursos();
                }
            } catch (e) { mostrarError('Error al crear curso'); }
        }

        async function eliminarCurso(id) {
            if (!confirm('¿Eliminar este curso?')) return;
            try {
                const res = await fetch(API_URL + '/cursos/' + id, { 
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                });
                if (res.ok) { mostrarExito('Curso eliminado'); cargarCursos(); }
            } catch (e) { mostrarError('Error al eliminar'); }
        }

        function mostrarError(m) { 
            const d = document.getElementById('mensaje'); 
            d.className = 'mensaje error'; d.textContent = '❌ ' + m;
            setTimeout(() => d.className = 'mensaje', 5000);
        }

        function mostrarExito(m) { 
            const d = document.getElementById('mensaje'); 
            d.className = 'mensaje exito'; d.textContent = '✅ ' + m;
            setTimeout(() => d.className = 'mensaje', 5000);
        }
    </script>
</body>
</html>
