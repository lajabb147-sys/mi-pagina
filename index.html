<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zensei Art Academy</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <script>
        // Si no está logueado, redirige al login
        if (!localStorage.getItem('usuarioLogueado')) {
            window.location.href = 'login.html'; 
        }
    </script>

    <div class="contenedor-principal">
        <header class="encabezado">
            <h1>Zensei Art Academy</h1>
        </header>

        <div class="grid-cursos" id="grid-cursos">
            <p>Cargando cursos...</p>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001/api';

        async function cargarCursos() {
            try {
                const res = await fetch(`${API_BASE}/cursos`);
                const data = await res.json();
                
                if (data.estado === 'éxito') {
                    const grid = document.getElementById('grid-cursos');
                    grid.innerHTML = '';
                    
                    data.datos.forEach(curso => {
                        const tarjeta = document.createElement('div');
                        tarjeta.className = 'tarjeta-curso';
                        tarjeta.innerHTML = `
                            <h3>${curso.nombre}</h3>
                            <p>${curso.descripcion}</p>
                            <a href="pago.html?cursoId=${curso.id}">Comprar</a>
                        `;
                        grid.appendChild(tarjeta);
                    });
                }
            } catch (e) {
                console.error("Error al conectar con el servidor:", e);
                document.getElementById('grid-cursos').innerHTML = '<p>Error al cargar. Asegúrate de que el servidor esté activo en el puerto 3001.</p>';
            }
        }

        window.addEventListener('DOMContentLoaded', cargarCursos);
    </script>
</body>
</html>
