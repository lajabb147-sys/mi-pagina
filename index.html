<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zensei Art Academy - Cursos Profesionales</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="contenedor-principal">
        <div class="contenedor-ajustes">
            <button class="btn-icon" onclick="toggleMenu(event)">⚙️</button>
            <div id="menuOpciones" class="menu-desplegable">
                <span class="menu-titulo" data-es="Visual" data-en="Visual">Visual</span>
                <button onclick="cambiarTema('oscuro')">🌙 <span data-es="Modo Oscuro" data-en="Dark Mode">Dark mode</span></button>
                <button onclick="cambiarTema('claro')">☀️ <span data-es="Modo Claro" data-en="Light Mode">Light mode</span></button>
                <hr class="menu-separador">
                <span class="menu-titulo" data-es="Idioma" data-en="Language">Idioma</span>
                <button onclick="cambiarIdioma('es')">Español</button>
                <button onclick="cambiarIdioma('en')">English</button>
                <hr class="menu-separador">
                <span class="menu-titulo" data-es="Audio" data-en="Audio">Audio</span>
                <button onclick="toggleSonido()" id="btnSonido" data-es="🔊 Sonido: ON" data-en="🔊 Sound: ON">🔊 Sonido: ON</button>
                <hr class="menu-separador">
                <button onclick="window.location.href='login.html'" id="btnLogin">🔑 <span data-es="Iniciar Sesión" data-en="Login">Iniciar Sesión</span></button>
                <button id="btnLogout" onclick="cerrarSesion()" style="display:none;">🚪 <span data-es="Cerrar Sesión" data-en="Logout">Cerrar Sesión</span></button>
            </div>
        </div>

        <header class="encabezado">
            <p class="txt-bienvenidos-arriba" data-es="Bienvenidos a" data-en="Welcome to">Bienvenidos a</p>
            <h1 class="titulo-academia">Zensei Art Academy</h1>
            <p class="txt-bienvenidos-abajo" data-es="Eleva tu talento al nivel profesional. Toca un curso para ver su especialización." data-en="Elevate your talent to a professional level. Tap a course to see its specialization.">
                Eleva tu talento al nivel profesional. Toca un curso para ver su especialización.
            </p>
        </header>

        <h3 class="titulo-categoria" data-es="🧑‍🎨 Estilos de Dibujo / Especializaciones" data-en="🧑‍🎨 Drawing Styles / Specializations">🧑‍🎨 Estilos de Dibujo / Especializaciones</h3>
        <div class="grid-cursos" id="grid-cursos">
            <p style="text-align: center; color: #666; grid-column: 1/-1; padding: 40px;">Cargando cursos...</p>
        </div>

        <footer class="pie-pagina">
            <p class="copyright" data-es="© 2026 Zensei Art Academy." data-en="© 2026 Zensei Art Academy.">© 2026 Zensei Art Academy.</p>
        </footer>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001/api';

        function cambiarIdioma(idioma) {
            localStorage.setItem('idiomaSeleccionado', idioma);
            location.reload(); 
        }

        function toggleMenu(event) { event.stopPropagation(); document.getElementById("menuOpciones").classList.toggle("mostrar"); }

        function cerrarSesion() {
            localStorage.removeItem('usuarioLogueado');
            window.location.reload();
        }

        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('usuarioLogueado')) {
                document.getElementById('btnLogin').style.display = 'none';
                document.getElementById('btnLogout').style.display = 'block';
            }
            cargarCursos();
        });

        async function cargarCursos() {
            const grid = document.getElementById('grid-cursos');
            try {
                const res = await fetch(`${API_BASE}/cursos`);
                const data = await res.json();
                if (data.estado === 'éxito') {
                    // LIMPIEZA: Esto evita que se dupliquen los cursos
                    grid.innerHTML = '';
                    
                    data.datos.forEach(curso => {
                        const comprado = localStorage.getItem(`curso_${curso.id}_comprado`) === 'true';
                        const tarjeta = document.createElement('div');
                        tarjeta.className = 'tarjeta-curso';
                        
                        tarjeta.innerHTML = `
                            <div class="imagen-curso">
                                <span class="badge-precio">$${curso.precio}</span>
                                <img src="${curso.imagen || 'default.jpg'}" alt="${curso.nombre}">
                            </div>
                            <div class="info-curso">
                                <h4>${curso.nombre}</h4>
                                <p>${curso.descripcion}</p>
                                <button onclick="manejarAccion(${curso.id}, ${comprado})" class="btn-enlace" style="background: ${comprado ? '#10b981' : '#00f2c3'}; color: #000; font-weight: bold;">
                                    ${comprado ? 'ACCEDER' : 'COMPRAR'}
                                </button>
                            </div>
                        `;
                        grid.appendChild(tarjeta);
                    });
                }
            } catch (e) { console.error('Error:', e); }
        }

        function manejarAccion(cursoId, yaComprado) {
            if (yaComprado) {
                window.location.href = `curso.html?id=${cursoId}`;
            } else {
                // Simulación directa: marcamos como comprado y refrescamos
                alert("¡Compra exitosa! Ahora tienes acceso.");
                localStorage.setItem(`curso_${cursoId}_comprado`, 'true');
                cargarCursos();
            }
        }
    </script>
</body>
</html>
